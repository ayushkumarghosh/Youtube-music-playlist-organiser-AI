<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">Local web app</p>
      <h1>{{ app_name }}</h1>
      <p class="hero-copy">
        Pull songs from your YouTube playlists, classify each one with Azure OpenAI, review the mood assignments, and sync managed private playlists back to your account.
      </p>
    </header>
    {% if flash %}
      <div class="flash flash-{{ flash.level }}">{{ flash.message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
